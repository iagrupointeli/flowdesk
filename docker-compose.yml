services:
  postgres:
    image: postgres:16-alpine
    container_name: flowdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Locale explícito para ordenação consistente de strings
      POSTGRES_INITDB_ARGS: "--locale=pt_BR.UTF-8 --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: flowdesk_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      # Usa o endpoint HTTP nativo do MinIO — não depende do mc estar instalado na imagem
      # /minio/health/live retorna 200 apenas quando a API está pronta para aceitar conexões
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # Container efêmero: cria o bucket automaticamente após o MinIO estar saudável
  minio-setup:
    image: minio/mc:latest
    container_name: flowdesk_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set none local/$${MINIO_BUCKET};
        mc ilm rule add --expiry-days 1 --tags 'confirmed!=true' local/$${MINIO_BUCKET};
        echo 'MinIO setup concluído.';
      "
    restart: "no"

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
